<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>feedback</title>
<style>
body{
    background:black;
    font-family:Arial;
    color:white;
}

.login-container{
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px gold;
}

.login-container h2{
    text-align:center;
    color:gold;
}

.login-container input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.login-container button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.table-container{
    width:95%;
    margin:30px auto;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th,td{
    border:1px solid gold;
    padding:12px;
    text-align:center;
}

th{
    background:gold;
    color:black;
}

</style>

<script>

const form = document.getElementById("loginForm");
const entryData = document.getElementById("entryData");

form.addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let feedback = document.getElementById("feedback").value;
    let email = document.getElementById("email").value;

    let row = `
        <tr>
            <td>${name}</td>
            <td>${feedback}</td>
            <td>${email}</td>
        </tr>
    `;

    entryData.innerHTML += row;

    form.reset();

});

</script>

</style>
</head>

<body>
<!-- NAVBAR -->
<div class="navbar">
    <div class="logo-text">JD Infra</div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="feedback.html">Feedback</a>
    </div>
</div>

<!-- LOGIN FORM -->
<div class="login-container">

    <form id="loginForm">
        <h2>Customer Entry Form</h2>

        <input type="text" id="name" placeholder="Enter Name" required>

        <input type="text" id="feedback" placeholder="Enter feedback" required>

        <input type="email" id="email" placeholder="Enter Email" required>

        <button type="submit">Submit Entry</button>
    </form>

</div>

<!-- DATA SHOW TABLE -->
<div class="table-container">

    <h2>Customer Entries</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>feedback</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody id="entryData">
        </tbody>

    </table>

</div>
