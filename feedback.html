<!DOCTYPE html>

<title>feedback</title>

<style>
/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #111;
    border-bottom: 2px solid #d4af37;
}
.logo-text {
    font-size: 28px;
    font-weight: bold;
    color: #d4af37;
}

 /* Nav Links */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 25px;
    background: linear-gradient(145deg, gold, rgb(239, 238, 238));
    color: black;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* Glow Hover */
.nav-links a:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(198, 147, 35, 0.6);
}

/* Shine Effect */
.nav-links a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgb(255, 255, 255), transparent);
    transition: 0.5s;
}

.nav-links a:hover::before {
    left: 100%;
}

.feedback {
    background: #000;
    color: #d4af37;
    text-align: center;
    padding: 50px 20px;
}

.feedback h2 {
    margin-bottom: 20px;
    font-size: 28px;
}

.feedback form {
    max-width: 400px;
    margin: auto;
}

.feedback input,
.feedback textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #d4af37;
    background: transparent;
    color: #fff;
    border-radius: 8px;
}

.feedback input::placeholder,
.feedback textarea::placeholder {
    color: #aaa;
}

.feedback button {
    background: linear-gradient(145deg, #d4af37, #b8962e);
    color: #000;
    border: none;
    padding: 12px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

.feedback button:hover {
    background: gold;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    background: #111;
    border-top: 2px solid #d4af37;
}

/* WhatsApp */
.whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: #fff;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
}

/* Responsive Website */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    overflow-x:hidden;
    font-family:Arial, sans-serif;
}

/* Navbar */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    padding:10px 20px;
}

/* Menu Buttons */
nav a{
    padding:12px 25px;
    border-radius:30px;
    font-size:18px;
    text-decoration:none;
}

/* Cards Section */
.cards-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    width:100%;
    padding:20px;
}

.card{
    width:100%;
    padding:20px;
    border-radius:20px;
}

/* Images */
img{
    max-width:100%;
    height:auto;
}

/* Mobile View */
@media(max-width:768px){

    nav{
        flex-direction:column;
        gap:10px;
    }

    nav a{
        width:90%;
        text-align:center;
        font-size:16px;
    }

    h1{
        font-size:32px;
        text-align:center;
    }

    .cards-container{
        grid-template-columns:1fr 1fr;
    }
}

/* Small Mobile */
@media(max-width:480px){

    .cards-container{
        grid-template-columns:1fr;
    }

    h1{
        font-size:26px;
    }

    nav a{
        font-size:15px;
        padding:10px;
    }
}

</style>
