<style>
body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}
/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: #111;
    border-bottom: 2px solid #d4af37;
}
.logo-text {
    font-size: 28px;
    font-weight: bold;
    color: #d4af37;
}

/* HEADER */
header {
    color: rgb(251, 248, 248);
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}
/* Nav Links */
.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 25px;
    background: linear-gradient(145deg, gold, rgb(239, 236, 236));
    color: black;
    font-weight: bold;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* Glow Hover */
.nav-links a:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(224, 164, 34, 0.6);
}

/* Shine Effect */
.nav-links a::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgb(255, 255, 255), transparent);
    transition: 0.5s;
}

.nav-links a:hover::before {
    left: 100%;
}

}

.login-container{
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px gold;
}

.login-container h2{
    text-align:center;
    color:gold;
}

.login-container input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.login-container button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.table-container{
    width:95%;
    margin:30px auto;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th,td{
    border:1px solid gold;
    padding:12px;
    text-align:center;
}

th{
    background:gold;
    color:black;
}

</style>

<script>

const form = document.getElementById("loginForm");
const entryData = document.getElementById("entryData");

form.addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let feedback = document.getElementById("feedback").value;
    let email = document.getElementById("email").value;

    let row = `
        <tr>
            <td>${name}</td>
            <td>${feedback}</td>
            <td>${email}</td>
        </tr>
    `;

    entryData.innerHTML += row;

    form.reset();

});

</script>

</style>

<!-- LOGIN FORM -->
<div class="login-container">

    <form id="loginForm">
        <h2>Customer Entry Form</h2>

        <input type="text" id="name" placeholder="Enter Name" required>

        <input type="text" id="feedback" placeholder="Enter feedback" required>

        <input type="email" id="email" placeholder="Enter Email" required>

        <button type="submit">Submit Entry</button>
    </form>

</div>

<!-- DATA SHOW TABLE -->
<div class="table-container">

    <h2>Customer Entries</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>feedback</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody id="entryData">
        </tbody>

    </table>

</div>
