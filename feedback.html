<!-- LOGIN FORM -->
<div class="login-container">

    <form id="loginForm">
        <h2>Customer Entry Form</h2>

        <input type="text" id="name" placeholder="Enter Name" required>

        <input type="tel" id="mobile" placeholder="Enter Mobile Number" required>

        <input type="email" id="email" placeholder="Enter Email" required>

        <button type="submit">Submit Entry</button>
    </form>

</div>

<!-- DATA SHOW TABLE -->
<div class="table-container">

    <h2>Customer Entries</h2>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody id="entryData">
        </tbody>

    </table>

</div>

<style>

body{
    background:black;
    font-family:Arial;
    color:white;
}

.login-container{
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:#111;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px gold;
}

.login-container h2{
    text-align:center;
    color:gold;
}

.login-container input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.login-container button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:gold;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.table-container{
    width:95%;
    margin:30px auto;
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#111;
}

th,td{
    border:1px solid gold;
    padding:12px;
    text-align:center;
}

th{
    background:gold;
    color:black;
}

</style>

<script>

const form = document.getElementById("loginForm");
const entryData = document.getElementById("entryData");

form.addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let email = document.getElementById("email").value;

    let row = `
        <tr>
            <td>${name}</td>
            <td>${mobile}</td>
            <td>${email}</td>
        </tr>
    `;

    entryData.innerHTML += row;

    form.reset();

});

const form = document.getElementById("loginForm");
const entryData = document.getElementById("entryData");

// Load saved data
let customers = JSON.parse(localStorage.getItem("customers")) || [];

showData();

form.addEventListener("submit", function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let email = document.getElementById("email").value;

    customers.push({
        name:name,
        mobile:mobile,
        email:email
    });

    localStorage.setItem("customers", JSON.stringify(customers));

    showData();

    form.reset();

});

function showData(){

    entryData.innerHTML = "";

    customers.forEach(customer => {

        entryData.innerHTML += `
        <tr>
            <td>${customer.name}</td>
            <td>${customer.mobile}</td>
            <td>${customer.email}</td>
        </tr>
        `;

    });

}
<script>
const form = document.getElementById("loginForm");
const entryData = document.getElementById("entryData");

let customers = JSON.parse(localStorage.getItem("customers")) || [];

displayData();

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const mobile = document.getElementById("mobile").value;
    const email = document.getElementById("email").value;

    customers.push({ name, mobile, email });

    localStorage.setItem("customers", JSON.stringify(customers));

    displayData();

    form.reset();
});

function displayData() {
    entryData.innerHTML = "";

    customers.forEach((customer, index) => {
        entryData.innerHTML += `
        <tr>
            <td>${customer.name}</td>
            <td>${customer.mobile}</td>
            <td>${customer.email}</td>
        </tr>
        `;
    });
}
</script>
</script>
