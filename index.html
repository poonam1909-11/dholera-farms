<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JD Infra</title>

<style>

/* BODY */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg, #ffffff, #ffffff);
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:black;
    position:sticky;
    top:0;
    z-index:1000;
}

/* LOGO */
.logo{
    color:gold;
    font-size:32px;
    font-weight:bold;
}

/* MENU */
.nav-links{
    display:flex;
    gap:15px;
}

/* MENU BUTTON */
.nav-links a{
    text-decoration:none;
    color:white;
    padding:10px 20px;
    border-radius:25px;
    background:linear-gradient(145deg,gold,#222);
    transition:0.3s;
    font-size:18px;
    font-weight:bold;
}

/* HOVER */
.nav-links a:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(255,215,0,0.5);
}

/* MENU ICON */
.menu-icon{
    display:none;
    font-size:30px;
    color:white;
    cursor:pointer;
}

/* LOGO IMAGE */
.main-logo{
    text-align:center;
    margin-top:40px;
}

.main-logo img{
    width:80%;
    max-width:600px;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

    /* FONT SIZE SMALL */
    .logo{
        font-size:24px;
    }

    .menu-icon{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:70px;
        right:0;
        background:black;
        width:100%;
        flex-direction:column;
        align-items:center;
        display:none;
        padding:20px 0;
    }

    .nav-links a{
        width:80%;
        text-align:center;
        margin:8px 0;
        font-size:16px;
    }

    .nav-links.active{
        display:flex;
    }

    .main-logo img{
        width:95%;
    }
}
/* ===================================== */
/* MOBILE RESPONSIVE AUTO FONT SIZE */
/* ===================================== */

/* BODY */
body{
    margin:0;
    padding:0;
    font-family:'Segoe UI',sans-serif;
    overflow-x:hidden;
}

/* IMAGES AUTO FIT */
img{
    max-width:100%;
    height:auto;
}

/* TEXT AUTO RESPONSIVE */
h1{
    font-size:clamp(28px,5vw,60px);
}

h2{
    font-size:clamp(24px,4vw,45px);
}

h3{
    font-size:clamp(20px,3vw,35px);
}

p{
    font-size:clamp(14px,2vw,18px);
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    padding:15px 20px;
}

/* LOGO */
.logo-text{
    font-size:clamp(22px,4vw,35px);
}

/* MENU */
.nav-links{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

/* MENU BUTTON */
.nav-links a{

    text-decoration:none;

    padding:
    clamp(8px,2vw,12px)
    clamp(14px,3vw,24px);

    font-size:clamp(14px,2vw,18px);

    border-radius:30px;
}

/* BUTTON */
button,
.direction-btn{

    font-size:clamp(14px,2vw,18px);

    padding:
    clamp(10px,2vw,14px)
    clamp(18px,4vw,30px);

}

/* INPUT */
input,
textarea{

    width:100%;
    box-sizing:border-box;

    font-size:clamp(14px,2vw,18px);

    padding:12px;
}

/* MAIN SECTION */
section{
    padding:40px 20px;
}

/* MOBILE */
@media(max-width:768px){

    .navbar{
        flex-direction:column;
        gap:15px;
        text-align:center;
    }

    .nav-links{
        justify-content:center;
    }

    .nav-links a{
        width:90%;
        text-align:center;
    }

    section{
        padding:30px 15px;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- LOGO -->
    <div class="logo">
        JD Infra
    </div>

    <!-- MENU -->
    <div class="nav-links" id="menu">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="feedback.html">Feedback</a>

    </div>

    <!-- MENU ICON -->
    <div class="menu-icon" onclick="toggleMenu()">
        ☰
    </div>

</div>

<!-- MAIN LOGO -->
<div class="main-logo">

    <img src="55.png" alt="JD Infra Logo">

</div>

<!-- JAVASCRIPT -->
<script>

function toggleMenu(){

    document
    .getElementById("menu")
    .classList
    .toggle("active");

}

</script>

</body>
</html>
