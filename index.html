<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JD Infra</title>

<style>

/* BODY */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f5f5f5;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 25px;
    background:black;
    position:sticky;
    top:0;
    z-index:1000;
}

/* LOGO */
.logo{
    color:gold;
    font-size:32px;
    font-weight:bold;
}

/* MENU */
.nav-links{
    display:flex;
    gap:15px;
}

/* MENU BUTTON */
.nav-links a{
    text-decoration:none;
    color:white;
    padding:10px 20px;
    border-radius:25px;
    background:linear-gradient(145deg,gold,#222);
    transition:0.3s;
    font-size:18px;
    font-weight:bold;
}

/* HOVER */
.nav-links a:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(255,215,0,0.5);
}

/* MENU ICON */
.menu-icon{
    display:none;
    font-size:30px;
    color:white;
    cursor:pointer;
}

/* LOGO IMAGE */
.main-logo{
    text-align:center;
    margin-top:40px;
}

.main-logo img{
    width:80%;
    max-width:600px;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

    /* FONT SIZE SMALL */
    .logo{
        font-size:24px;
    }

    .menu-icon{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:70px;
        right:0;
        background:black;
        width:100%;
        flex-direction:column;
        align-items:center;
        display:none;
        padding:20px 0;
    }

    .nav-links a{
        width:80%;
        text-align:center;
        margin:8px 0;
        font-size:16px;
    }

    .nav-links.active{
        display:flex;
    }

    .main-logo img{
        width:95%;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- LOGO -->
    <div class="logo">
        JD Infra
    </div>

    <!-- MENU -->
    <div class="nav-links" id="menu">
        <a href="home.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="feedback.html">Feedback</a>

    </div>

    <!-- MENU ICON -->
    <div class="menu-icon" onclick="toggleMenu()">
        ☰
    </div>

</div>

<!-- MAIN LOGO -->
<div class="main-logo">

    <img src="55.png" alt="JD Infra Logo">

</div>

<!-- JAVASCRIPT -->
<script>

function toggleMenu(){

    document
    .getElementById("menu")
    .classList
    .toggle("active");

}

</script>

</body>
</html>
